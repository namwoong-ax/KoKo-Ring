function irang(word) {
  const c = word.charCodeAt(word.length - 1);
  if (c < 0xAC00 || c > 0xD7A3) return word + "이랑";
  return word + ((c - 0xAC00) % 28 === 0 ? "랑" : "이랑");
}

  ["여름 한낮","겨울 새벽","온도"],["오븐","냉장고","온도"],["찜질방","냉방된 실내","온도"],
  ["끓는 물","수돗물","온도"],["화산","일반 땅","온도"],["사막","북극","온도"],
  ["뜨거운 커피","아이스 아메리카노","온도"],["모닥불","촛불","온도"],
  ["태양","달","밝기"],["형광등","촛불","밝기"],["번개","전구","밝기"],
  ["낮","밤","밝기"],["맑은 날","흐린 날","밝기"],["무대조명","손전등","밝기"],
  ["바다","호수","넓이"],["태평양","대서양","넓이"],["축구장","농구장","넓이"],
  ["중국","한국","넓이"],["도시","마을","넓이"],["대형마트","편의점","넓이"],
  ["대학교 캠퍼스","초등학교","넓이"],["서울","부산","넓이"]
];

const SPATIAL_TYPES = {
  "크기":["어느 쪽이 더 클까요?","어느 쪽이 더 작을까요?"],
  "무게":["어느 쪽이 더 무거울까요?","어느 쪽이 더 가벼울까요?"],
  "높이":["어느 쪽이 더 높을까요?","어느 쪽이 더 낮을까요?"],
  "속도":["어느 쪽이 더 빠를까요?","어느 쪽이 더 느릴까요?"],
  "길이":["어느 쪽이 더 길까요?","어느 쪽이 더 짧을까요?"],
  "온도":["어느 쪽이 더 뜨거울까요?","어느 쪽이 더 차가울까요?"],
  "밝기":["어느 쪽이 더 밝을까요?","어느 쪽이 더 어두울까요?"],
  "넓이":["어느 쪽이 더 넓을까요?","어느 쪽이 더 좁을까요?"]
};

function pickRandom(arr, n) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, n);
}

function buildPools() {
  const pools = {
    0:{domain:"지남력",qs:[]},1:{domain:"계산",qs:[]},
    2:{domain:"언어",qs:[]},3:{domain:"시공간",qs:[]},4:{domain:"지남력+",qs:[]}
  };
  LANG_DATA.forEach(([hint,correct,wrong]) => {
    const img = LANG_EMOJI[correct] || null;
    const f = Math.random() < 0.5;
    pools[2].qs.push({q:hint+". 이게 뭘까요?",img,options:f?[correct,wrong]:[wrong,correct],correctIndex:f?0:1});
  });
  SPATIAL_DATA.forEach(([big,small,type]) => {
    const types = SPATIAL_TYPES[type] || ["어느 쪽이 더 클까요?","어느 쪽이 더 작을까요?"];
    const f1 = Math.random() < 0.5;
    // 이랑/랑 자동 처리
    pools[3].qs.push({q:irang(big)+" "+small+" 중에, "+types[0],img:null,options:f1?[big,small]:[small,big],correctIndex:f1?0:1});
    const f2 = Math.random() < 0.5;
    pools[3].qs.push({q:irang(big)+" "+small+" 중에, "+types[1],img:null,options:f2?[small,big]:[big,small],correctIndex:f2?0:1});
  });
  ORIENT_DATA.forEach(([correct,wrong,q]) => {
    const f = Math.random() < 0.5;
    const item = {q,img:null,options:f?[correct,wrong]:[wrong,correct],correctIndex:f?0:1};
    pools[0].qs.push(item); pools[4].qs.push(Object.assign({},item));
  });
  [3,4,5,6,7,8,9].forEach(sub => {
    for (let a=13;a<=150;a++) {
      const c=a-sub; if(c<=0)continue;
      const off=15+((a*sub)%11); const w=c+off; const f=Math.random()<0.5;
      pools[1].qs.push({q:a+"에서 "+sub+"을 빼면 얼마일까요?",img:null,options:f?[String(c),String(w)]:[String(w),String(c)],correctIndex:f?0:1});
    }
  });
  [3,4,5,6,7].forEach(add => {
    for (let a=10;a<=90;a++) {
      const c=a+add; const off=15+((a*add)%11); const w=c+off; const f=Math.random()<0.5;
      pools[1].qs.push({q:a+"에 "+add+"을 더하면 얼마일까요?",img:null,options:f?[String(c),String(w)]:[String(w),String(c)],correctIndex:f?0:1});
    }
  });
  return pools;
}

let POOLS=null,questions=[],current=0,answers=[],domain="";
function startQuiz(){
  POOLS=buildPools();
  const sel=document.getElementById("day-select").value;
  const idx=sel==="random"?Math.floor(Math.random()*5):parseInt(sel);
  const bank=POOLS[idx]; domain=bank.domain;
  questions=pickRandom(bank.qs,5); current=0; answers=[];
  document.getElementById("result-area").style.display="none";
  document.getElementById("quiz-area").style.display="block";
  showQ();
}
function showQ(){
  const q=questions[current];
  document.getElementById("progress").textContent=(current+1)+" / "+questions.length;
  document.getElementById("domain-badge").textContent=domain;
  document.getElementById("question-text").textContent=q.q;
  const imgEl=document.getElementById("img-area");
  if(q.img){imgEl.style.display="flex";imgEl.textContent=q.img;}else imgEl.style.display="none";
  document.getElementById("opt1").textContent=q.options[0];
  document.getElementById("opt2").textContent=q.options[1];
  document.getElementById("opt1").className="opt"; document.getElementById("opt2").className="opt";
  document.getElementById("opt1").disabled=false; document.getElementById("opt2").disabled=false;
}
function choose(idx){
  const q=questions[current]; const isCorrect=idx===q.correctIndex;
  answers.push({q:q.q,chosen:q.options[idx],correct:q.options[q.correctIndex],isCorrect});
  document.getElementById(idx===0?"opt1":"opt2").classList.add("chosen");
  document.getElementById("opt1").disabled=true; document.getElementById("opt2").disabled=true;
  setTimeout(()=>{current++;if(current<questions.length)showQ();else showResult();},400);
}
function showResult(){
  document.getElementById("quiz-area").style.display="none";
  const score=answers.filter(a=>a.isCorrect).length;
  const color=score>=4?"#3BA776":score>=3?"#E5A33D":"#D9534F";
  const rows=answers.map((a,i)=>"<div class=\"result-row\"><div class=\"result-q\">"+(i+1)+". "+(a.q.length>22?a.q.slice(0,22)+"...":a.q)+"</div><div class=\"result-ans\" style=\"color:"+(a.isCorrect?"#3BA776":"#D9534F")+"\">"+a.chosen+" "+(a.isCorrect?"✓":"✗")+"</div></div>").join("");
  document.getElementById("result-area").innerHTML="<div class=\"result-card\"><div class=\"badge\">"+domain+"</div><div class=\"result-score\" style=\"color:"+color+"\">"+score+"/5</div><div class=\"result-sub\">"+(score===5?"완벽해요!":score>=3?"잘 하셨어요":"다시 해봐요")+"</div><div>"+rows+"</div><button class=\"retry-btn\" id=\"retry-btn\">같은 영역 다시 테스트</button></div>";
  document.getElementById("result-area").style.display="block";
  // iOS Safari에서 innerHTML로 주입된 onclick이 차단되므로 addEventListener 사용
  var btn = document.getElementById("retry-btn");
  if (btn) btn.addEventListener("click", startQuiz);
}
</script>
